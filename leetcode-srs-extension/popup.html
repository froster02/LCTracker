<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode Galaxy</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <img src="icon.png" alt="Logo" class="logo" />
      <h1>LeetCode Galaxy</h1>
    </div>

    <div id="authSection" class="section">
      <div id="authStatus" class="status">
        <span class="status-dot offline"></span>
        <span id="authText">Not signed in</span>
      </div>
      <button id="signInBtn" class="btn btn-primary">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.4 7.86 10.93.57.1.78-.25.78-.55 0-.27-.01-1.17-.02-2.12-3.2.7-3.88-1.36-3.88-1.36-.52-1.34-1.28-1.69-1.28-1.69-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.69 1.25 3.34.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.18-3.09-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.12 3.05.74.8 1.18 1.83 1.18 3.09 0 4.42-2.69 5.4-5.25 5.68.41.36.78 1.07.78 2.15 0 1.55-.01 2.8-.01 3.18 0 .3.21.66.79.55A10.52 10.52 0 0 0 23.5 12c0-6.35-5.15-11.5-11.5-11.5z"/>
        </svg>
        Sign in with GitHub
      </button>
      <p id="signInHint" class="hint">Sign in to auto-track your submissions and back them up to your GitHub.</p>
      <button id="signOutBtn" class="btn btn-secondary hidden">Sign out</button>
    </div>

    <div id="trackingSection" class="section hidden">
      <div class="instructions">
        <p class="inst-header">How to sync:</p>
        <ol>
          <li>Open <a href="https://leetcode.com" target="_blank">leetcode.com</a> and log in.</li>
          <li>Select the sync date range below.</li>
          <li>Click <strong>Sync History</strong>.</li>
        </ol>
      </div>

      <div class="date-inputs">
        <div class="input-group">
          <label for="startDateInput">Start Date</label>
          <input type="date" id="startDateInput" />
        </div>
        <div class="input-group">
          <label for="endDateInput">End Date</label>
          <input type="date" id="endDateInput" />
        </div>
      </div>

      <div class="info-row">
        <span>Queue Status</span>
        <span id="queueStatus" class="badge">0 pending</span>
      </div>
      <div class="info-row">
        <span>Last Sync</span>
        <span id="lastSync">Never</span>
      </div>
      <button id="syncBtn" class="btn btn-outline">Sync History</button>
    </div>

    <div id="progressSection" class="section hidden">
      <p id="progressText" class="progress-text">Ready</p>
      <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div id="errorBanner" class="banner banner-error hidden" role="alert"></div>

    <div class="footer">
      <a id="dashboardLink" href="#" target="_blank">Open Dashboard →</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
